<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Section | GreatFrontEnd Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="img/favicon.ico" sizes="any" />
  </head>
  <body>
    <!-- semantic html for the page -->
     <section class="newsletter-subscription">
        <section class="subscription">
          <h1>
            Get the finest curated abstracts delivered weekly to your inbox
          </h1>
          <ul class="subbing-pros">
            <li>
              Exclusive access to new abstract images and collections
            </li>
            <li>
              Unlock special promotions only or subscribers
            </li>
            <li>
              regular doses for artistic inspiration
            </li>
          </ul>
          <form action="#">
            <label for="user-email">Enter email</label>
            <input id="user-email" type="email" placeholder="enter your email" required pattern="^[a-zA-Z0-9._%+-]+@([a-zA-Z0-9-]+\.)+edu$" title="user123@example.com">
            <button type="submit">Subscribe</button>
          </form>
        </section>
        <figure class="hero-image-container">
          <img src="img/abstract.jpg" alt="abstract">
        </figure>
     </section>

    <!-- Attribute this challenge to yourself! -->
    <div class="credits">
      A challenge by
      <a
        href="https://www.greatfrontend.com/projects?ref=challenges"
        target="_blank"
        >GreatFrontEnd Projects</a
      >. Built by
      <a href="https://www.greatfrontend.com/u/your_username" target="_blank"
        >Yash Kumar</a
      >.
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
